<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remembering Professor Tony: The Story of How He Changed Me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f3ede4;
        --paper-bright: #fbf7f1;
        --ink: #181412;
        --ink-soft: #5f544b;
        --accent: #8b2f28;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 15% 0%, rgba(139, 47, 40, 0.08), transparent 24%),
          linear-gradient(180deg, #f8f4ed 0%, var(--paper) 100%);
        color: var(--ink);
        font-family: "Instrument Sans", "Segoe UI", sans-serif;
      }

      .stage {
        width: 1200px;
        height: 630px;
        padding: 28px;
      }

      .safe-frame {
        display: grid;
        grid-template-columns: minmax(0, 0.58fr) minmax(0, 0.42fr);
        gap: 24px;
        height: 100%;
        padding: 30px;
        border: 1px solid rgba(24, 20, 18, 0.08);
        border-radius: 34px;
        background: rgba(255, 251, 245, 0.86);
        box-shadow: 0 28px 80px rgba(52, 35, 27, 0.1);
      }

      .safe-copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 18px;
        min-width: 0;
      }

      .eyebrow,
      .credit {
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 9ch;
        font-family: "Newsreader", Georgia, serif;
        font-size: 54px;
        line-height: 0.92;
        font-weight: 600;
        letter-spacing: -0.06em;
      }

      h1 span {
        display: block;
      }

      p {
        margin: 0;
        max-width: 520px;
        color: var(--ink-soft);
        font-size: 22px;
        line-height: 1.35;
      }

      .meta {
        color: var(--ink-soft);
        font-size: 13px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .safe-media {
        margin: 0;
        display: flex;
        align-items: center;
      }

      .safe-media-frame {
        width: 100%;
        padding: 12px;
        border-radius: 30px;
        background: linear-gradient(160deg, rgba(255, 252, 248, 0.94), rgba(224, 205, 180, 0.44));
      }

      .safe-media img {
        width: 100%;
        height: 100%;
        aspect-ratio: 2 / 3;
        border-radius: 22px;
        object-fit: cover;
        object-position: center 16%;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="safe-frame">
        <div class="safe-copy">
          <span class="eyebrow">Public Memorial</span>
          <h1>Remembering Professor Tony: <span>The Story of How He Changed Me</span></h1>
          <p>
            How he encouraged me step by step until building something real
            felt possible.
          </p>
          <div class="credit">Joe Hu</div>
          <div class="meta">47 years at Carleton • Founder of TIM</div>
        </div>

        <figure class="safe-media">
          <div class="safe-media-frame">
            <img
              src="assets/images/hero-joe-tony-premium.jpg"
              alt="Joe Hu and Professor Tony Bailetti smiling together."
            />
          </div>
        </figure>
      </section>
    </main>
  </body>
</html>
