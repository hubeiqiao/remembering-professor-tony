<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remembering Professor Tony: The Story of How He Changed Me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #0a0a0b;
        --paper-bright: #121214;
        --ink: #f0ebe1;
        --ink-soft: #b3aca3;
        --accent: #d33c3c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 18% 0%, rgba(211, 60, 60, 0.18), transparent 24%),
          linear-gradient(180deg, #0f0f10 0%, var(--paper) 100%);
        color: var(--ink);
        font-family: "Instrument Sans", sans-serif;
      }

      .stage {
        width: 1200px;
        height: 630px;
        padding: 28px;
      }

      .safe-frame {
        display: grid;
        grid-template-columns: minmax(0, 0.58fr) minmax(0, 0.42fr);
        gap: 24px;
        height: 100%;
        padding: 30px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 34px;
        background:
          linear-gradient(140deg, rgba(15, 15, 16, 0.96), rgba(19, 19, 21, 0.82)),
          rgba(10, 10, 11, 0.94);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.3);
      }

      .safe-copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 18px;
        min-width: 0;
      }

      .eyebrow,
      .credit {
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 9ch;
        font-family: "Newsreader", Georgia, serif;
        font-size: 54px;
        line-height: 0.92;
        font-weight: 600;
        letter-spacing: -0.06em;
        text-wrap: balance;
      }

      h1 span {
        display: block;
      }

      p {
        margin: 0;
        max-width: 520px;
        color: var(--ink-soft);
        font-size: 22px;
        line-height: 1.35;
      }

      .meta {
        color: var(--ink-soft);
        font-size: 13px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .safe-media {
        margin: 0;
        display: flex;
        align-items: center;
      }

      .safe-media-frame {
        width: 100%;
        padding: 12px;
        border-radius: 30px;
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.08), rgba(211, 60, 60, 0.14));
      }

      .safe-media img {
        width: 100%;
        height: 100%;
        aspect-ratio: 2 / 3;
        border-radius: 22px;
        object-fit: cover;
        object-position: center 16%;
        filter: grayscale(100%) contrast(1.08);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.38);
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="safe-frame">
        <div class="safe-copy">
          <span class="eyebrow">Public Memorial</span>
          <h1>Remembering Professor Tony: <span>The Story of How He Changed Me</span></h1>
          <div class="credit">A public memorial from Joe Hu</div>
          <p>
            The story of how his encouragement turned uncertainty into
            confidence, research into action, and building into a path.
          </p>
          <div class="meta">47 years at Carleton • Founder of TIM</div>
        </div>

        <figure class="safe-media">
          <div class="safe-media-frame">
            <img
              src="assets/images/hero-joe-tony-premium.jpg"
              alt="Joe Hu and Professor Tony Bailetti smiling together."
              width="1200"
              height="1800"
            />
          </div>
        </figure>
      </section>
    </main>
  </body>
</html>
